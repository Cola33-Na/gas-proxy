<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料查詢</title>
  <style>
    /* 你的原有 CSS 樣式保持不變 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      width: 100%;
      max-width: 1200px;
      animation: slideIn 0.5s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
      text-align: center;
    }
    
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .input-group {
      margin-bottom: 25px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s;
      background: #f8f9fa;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    
    input[type="text"].error {
      border-color: #f44336;
      background: #ffebee;
    }
    
    .error-hint {
      color: #f44336;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }
    
    .error-hint.show {
      display: block;
    }
    
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 25px;
      position: relative;
      overflow: hidden;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button.loading {
      pointer-events: none;
      opacity: 0.8;
    }
    
    button.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin-left: -10px;
      margin-top: -10px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spinner 0.8s linear infinite;
    }
    
    @keyframes spinner {
      to { transform: rotate(360deg); }
    }
    
    .results-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .result-section {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 15px;
    }
    
    .result-section h3 {
      color: #333;
      font-size: 16px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #667eea;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .result-section.full-width {
      grid-column: 1 / -1;
    }
    
    .result-box {
      min-height: 100px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #333;
    }
    
    .result-box.has-content {
      background: #e8f5e9;
      border-color: #4caf50;
    }
    
    .result-box.error {
      background: #ffebee;
      border-color: #f44336;
      color: #c62828;
    }
    
    .empty-state {
      color: #999;
      text-align: center;
      padding: 30px;
      font-style: italic;
    }
    
    .not-found {
      color: #f44336;
      text-align: center;
      padding: 40px;
      font-size: 18px;
      font-weight: bold;
    }
    
    .data-item {
      padding: 8px;
      margin: 4px 0;
      background: white;
      border-radius: 6px;
      border-left: 3px solid #667eea;
      animation: fadeIn 0.3s ease-out;
      word-break: break-all;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .book-info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 12px;
    }
    
    .book-info-label {
      color: #666;
      font-weight: 600;
    }
    
    .book-info-value {
      color: #333;
    }
    
    .library-count {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      text-align: center;
      padding: 20px;
    }
    
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 8px;
      font-size: 13px;
      color: #1976d2;
    }
    
    .copy-btn {
      background: #2196f3;
      color: white;
      border: none;
      padding: 5px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .copy-btn:hover {
      background: #1976d2;
    }
    
    .copy-btn.copied {
      background: #4caf50;
    }
    
    .status-msg {
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-top: 10px;
    }
    
    .success-msg {
      color: #4caf50;
    }
    
    .error-msg {
      color: #f44336;
    }
    
    /* 圖書館表格樣式 */
    .library-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 5px;
    }
    
    .library-table th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 8px;
      text-align: left;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .library-table td {
      padding: 8px;
      border-bottom: 1px solid #e0e0e0;
      background: white;
    }
    
    .library-table tr:hover td {
      background: #f5f5f5;
    }
    
    .library-table tr:nth-child(even) td {
      background: #fafafa;
    }
    
    .library-col-a { min-width: 180px; }
    .library-col-b { min-width: 120px; }
    .library-col-c { min-width: 80px; }
    .library-col-d { min-width: 80px; }
    .library-col-e { min-width: 120px; }
    .library-col-f { min-width: 100px; }
    
    .text-muted {
      color: #999;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 資料查詢</h1>
    <p class="subtitle">輸入關鍵字後按 Enter</p>
    
    <div class="input-group">
      <label for="inputBox">輸入關鍵字（14位純數字）</label>
      <input type="text" id="inputBox" placeholder="請輸入14位純數字..." autofocus maxlength="14">
      <div class="error-hint" id="errorHint">格式不符，請重新輸入（必須是14位純數字）</div>
    </div>
    
    <button id="queryBtn" onclick="submitQuery()">送出查詢</button>
    
    <div class="info-bar" id="infoBar" style="display: none;">
      <span id="infoText"></span>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()">複製全部</button>
    </div>
    
    <div class="results-container" id="resultsContainer" style="display: none;">
      <!-- 可選圖書館 -->
      <div class="result-section">
        <h3>📚 可選項目</h3>
        <div class="result-box" id="libraryCountBox">
          <div class="empty-state">等待查詢...</div>
        </div>
      </div>
      
      <!-- 書本資料 -->
      <div class="result-section">
        <h3>📖 書本資料</h3>
        <div class="result-box" id="bookInfoBox">
          <div class="empty-state">等待查詢...</div>
        </div>
      </div>
      
      <!-- 圖書館列表 -->
      <div class="result-section full-width">
        <h3>🏛️ 圖書館</h3>
        <div class="result-box" id="librariesBox">
          <div class="empty-state">等待查詢...</div>
        </div>
      </div>
    </div>
    
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <script>
    // API 基礎路徑 - 使用相對路徑，自動指向目前網域的 /api
    const API_BASE = '/api';
    
    // 驗證14位純數字
    function validateInput(value) {
      const regex = /^\d{14}$/;
      return regex.test(value);
    }
    
    // 即時驗證輸入
    function validateInputRealtime() {
      const inputBox = document.getElementById('inputBox');
      const errorHint = document.getElementById('errorHint');
      const value = inputBox.value.trim();
      
      // 移除非數字字符
      const cleanValue = value.replace(/\D/g, '');
      if (value !== cleanValue) {
        inputBox.value = cleanValue;
      }
      
      // 限制長度為14
      if (cleanValue.length > 14) {
        inputBox.value = cleanValue.substring(0, 14);
      }
      
      // 檢查是否為14位純數字
      if (cleanValue.length === 14 && validateInput(cleanValue)) {
        inputBox.classList.remove('error');
        errorHint.classList.remove('show');
        return true;
      } else if (cleanValue.length > 0) {
        // 輸入中但還沒滿14位，不顯示錯誤
        inputBox.classList.remove('error');
        errorHint.classList.remove('show');
        return false;
      }
      return false;
    }
    
    // 主要修改：改用 fetch API 取代 google.script.run
    async function submitQuery() {
      const inputBox = document.getElementById('inputBox');
      const inputValue = inputBox.value.trim();
      const btn = document.getElementById('queryBtn');
      const infoBar = document.getElementById('infoBar');
      const resultsContainer = document.getElementById('resultsContainer');
      const statusMsg = document.getElementById('statusMsg');
      const errorHint = document.getElementById('errorHint');
      
      // 驗證輸入
      if (!validateInput(inputValue)) {
        inputBox.classList.add('error');
        errorHint.classList.add('show');
        inputBox.focus();
        return;
      }
      
      // 清除錯誤狀態
      inputBox.classList.remove('error');
      errorHint.classList.remove('show');
      
      // 顯示載入狀態
      btn.classList.add('loading');
      btn.textContent = '執行中...';
      infoBar.style.display = 'none';
      resultsContainer.style.display = 'none';
      statusMsg.textContent = '';
      statusMsg.className = 'status-msg';
      
      try {
        // 使用 fetch 呼叫 API - 這是關鍵修改！
        const response = await fetch(`${API_BASE}?action=query&input=${encodeURIComponent(inputValue)}`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
          }
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        // 恢復按鈕狀態
        btn.classList.remove('loading');
        btn.textContent = '送出查詢';
        
        if (data.success) {
          // 檢查 A1 是否為「找不到相應值」
          if (data.a1Value && data.a1Value.toString().includes('找不到相應值')) {
            showNotFound(data.a1Value);
          } else {
            displayResults(data);
            statusMsg.textContent = `✅ 共 ${data.rowCount} 筆結果`;
            statusMsg.className = 'status-msg success-msg';
          }
        } else {
          showError(data.error || '未知錯誤');
        }
        
      } catch (error) {
        btn.classList.remove('loading');
        btn.textContent = '送出查詢';
        showError('連線錯誤：' + error.message);
        console.error('Error:', error);
      }
    }
    
    // 顯示找不到相應值
    function showNotFound(a1Value) {
      const infoBar = document.getElementById('infoBar');
      const resultsContainer = document.getElementById('resultsContainer');
      const libraryCountBox = document.getElementById('libraryCountBox');
      const bookInfoBox = document.getElementById('bookInfoBox');
      const librariesBox = document.getElementById('librariesBox');
      const statusMsg = document.getElementById('statusMsg');
      
      // 顯示資訊列（但隱藏複製按鈕）
      infoBar.style.display = 'flex';
      document.getElementById('infoText').textContent = '查詢結果';
      document.getElementById('copyBtn').style.display = 'none';
      
      // 顯示結果容器
      resultsContainer.style.display = 'grid';
      
      // 所有結果框顯示「找不到相應值」
      const notFoundHtml = '<div class="not-found">❌ 找不到相應值</div>';
      libraryCountBox.innerHTML = notFoundHtml;
      bookInfoBox.innerHTML = notFoundHtml;
      librariesBox.innerHTML = notFoundHtml;
      
      // 狀態訊息
      statusMsg.textContent = '❌ ' + a1Value;
      statusMsg.className = 'status-msg error-msg';
    }
    
    function displayResults(data) {
      const infoBar = document.getElementById('infoBar');
      const resultsContainer = document.getElementById('resultsContainer');
      const libraryCountBox = document.getElementById('libraryCountBox');
      const bookInfoBox = document.getElementById('bookInfoBox');
      const librariesBox = document.getElementById('librariesBox');
      const copyBtn = document.getElementById('copyBtn');
      
      // 顯示資訊列（顯示複製按鈕）
      infoBar.style.display = 'flex';
      document.getElementById('infoText').textContent = `輸入: ${data.inputValue}`;
      copyBtn.style.display = 'block';
      
      // 顯示結果容器
      resultsContainer.style.display = 'grid';
      
      // 直接使用後端回傳的結構化資料
      const bookInfo = data.bookInfo || {};
      const libraries = data.libraries || [];
      const libraryCount = data.libraryCount || 0;
      
      // 顯示可選圖書館數量
      libraryCountBox.innerHTML = `<div class="library-count">${libraryCount}<div style="font-size: 14px; color: #666; margin-top: 5px;">個項目</div></div>`;
      
      // 顯示書本資料（10項資料：書名、館藏編目號碼、索書號、著者、著錄、出版地、出版者、出版年份、叢書名）
      bookInfoBox.innerHTML = `
        <div class="book-info-grid">
          <div class="book-info-label">書名:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.title || 'N/A')}</div>
          <div class="book-info-label">館藏編目號碼:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.catalogNo || 'N/A')}</div>
          <div class="book-info-label">索書號:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.callNo || 'N/A')}</div>
          <div class="book-info-label">著者:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.author || 'N/A')}</div>
          <div class="book-info-label">著錄:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.description || 'N/A')}</div>
          <div class="book-info-label">出版地:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.pubLoc || 'N/A')}</div>
          <div class="book-info-label">出版者:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.publisher || 'N/A')}</div>
          <div class="book-info-label">出版年份:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.pubYear || 'N/A')}</div>
          <div class="book-info-label">叢書名:</div>
          <div class="book-info-value">${escapeHtml(bookInfo.series || 'N/A')}</div>
        </div>
      `;
      
      // 顯示圖書館列表（A-F欄表格）
      if (libraries.length > 0) {
        // 檢查是否為物件陣列（新格式）或字串陣列（舊格式）
        const isObjectFormat = typeof libraries[0] === 'object';
        
        let tableHtml = `
          <table class="library-table">
            <thead>
              <tr>
                <th class="library-col-a">圖書館</th>
                <th class="library-col-b">索書號</th>
                <th class="library-col-c">期次</th>
                <th class="library-col-d">媒體碼</th>
                <th class="library-col-e">館藏現況</th>
                <th class="library-col-f">館藏</th>
              </tr>
            </thead>
            <tbody>
        `;
        
        libraries.forEach((lib) => {
          if (isObjectFormat) {
            // 新格式：物件包含所有欄位
            tableHtml += `
              <tr>
                <td>${escapeHtml(lib.library || '')}</td>
                <td>${escapeHtml(lib.callNumber || '')}</td>
                <td>${escapeHtml(lib.issue || '') || '<span class="text-muted">-</span>'}</td>
                <td>${escapeHtml(lib.mediaCode || '') || '<span class="text-muted">-</span>'}</td>
                <td>${escapeHtml(lib.status || '')}</td>
                <td>${escapeHtml(lib.collection || '')}</td>
              </tr>
            `;
          } else {
            // 舊格式：只有字串（圖書館名稱）
            tableHtml += `
              <tr>
                <td>${escapeHtml(lib)}</td>
                <td colspan="5" class="text-muted">無詳細資料</td>
              </tr>
            `;
          }
        });
        
        tableHtml += '</tbody></table>';
        librariesBox.innerHTML = tableHtml;
      } else {
        librariesBox.innerHTML = '<div class="empty-state">無圖書館資料</div>';
      }
    }
    
    function showError(message) {
      const infoBar = document.getElementById('infoBar');
      const resultsContainer = document.getElementById('resultsContainer');
      const statusMsg = document.getElementById('statusMsg');
      
      infoBar.style.display = 'none';
      resultsContainer.style.display = 'none';
      statusMsg.textContent = '❌ ' + message;
      statusMsg.className = 'status-msg error-msg';
    }
    
    function copyResult() {
      const librariesBox = document.getElementById('librariesBox');
      const rows = librariesBox.querySelectorAll('.library-table tbody tr');
      
      if (rows.length === 0) return;
      
      let text = '';
      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        const rowData = Array.from(cells).map(cell => cell.textContent.trim()).join('\t');
        text += rowData + '\n';
      });
      
      navigator.clipboard.writeText(text).then(() => {
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.textContent = '已複製!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = '複製全部';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 監聽輸入（即時驗證）
    document.getElementById('inputBox').addEventListener('input', validateInputRealtime);
    
    // 監聽 Enter 鍵
    document.getElementById('inputBox').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        submitQuery();
      }
    });
    
    // 頁面載入時聚焦輸入框
    window.onload = function() {
      document.getElementById('inputBox').focus();
    };
  </script>
</body>
</html>
